name: cosmetics_avon
description: "A scalable cosmetics e-commerce application built with Flutter using MVVM architecture, Cubit state management, and Dio for API integration, focused on performance, clean code, and a seamless user experience."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_gen_runner: ^5.12.0
  build_runner: ^2.11.1
  easy_localization: ^3.0.8
  flutter_svg: ^2.2.3
  dio: ^5.9.2
  flutter_bloc: ^9.1.1
  pin_code_fields: ^9.3.0
  intl_phone_field: ^3.2.0
  toastification: ^3.2.0
  lottie: ^3.3.3
  shared_preferences: ^2.2.2
  flutter_animate: ^4.5.2
  image_picker: ^1.2.2
  http_parser: ^4.1.2
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
    - assets/lottie/

  fonts:
      - family: Montserrat
        fonts:
          - asset: assets/fonts/montserrat.ttf

      - family: Segoe UI
        fonts:
          - asset: assets/fonts/segoeuithis.ttf